<svg width="1920" height="716" viewBox="0 0 1920 716" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hybrid script and agent workflow diagram</title>
  <desc id="desc">A workflow diagram showing incoming support tickets being interpreted by an LLM, validated by deterministic code, and then either auto-routed or sent to human review.</desc>
  <defs>
    <linearGradient id="bg" x1="117" y1="68" x2="1803" y2="648" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4E8D2"/>
      <stop offset="1" stop-color="#D8E5E0"/>
    </linearGradient>
    <linearGradient id="agent" x1="674" y1="192" x2="934" y2="524" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C76637"/>
      <stop offset="1" stop-color="#8F3D24"/>
    </linearGradient>
    <linearGradient id="script" x1="1004" y1="192" x2="1264" y2="524" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2F5D62"/>
      <stop offset="1" stop-color="#193A3E"/>
    </linearGradient>
    <linearGradient id="good" x1="1390" y1="408" x2="1676" y2="408" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6E8B3D"/>
      <stop offset="1" stop-color="#4B6326"/>
    </linearGradient>
    <linearGradient id="review" x1="1390" y1="524" x2="1676" y2="524" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6E5A91"/>
      <stop offset="1" stop-color="#4D3D6D"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1920" height="716" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#132025" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L7 3.5L0 7V0Z" fill="#26434A"/>
    </marker>
    <style>
      .label { font: 700 24px Georgia, serif; fill: #132025; }
      .label-branch { font: 700 19px Georgia, serif; fill: #132025; }
      .body { font: 500 18px Arial, sans-serif; fill: #284046; }
      .body-light { font: 500 18px Arial, sans-serif; fill: #F8F6F1; }
      .body-light-small { font: 500 16px Arial, sans-serif; fill: #F8F6F1; }
      .title { font: 700 34px Georgia, serif; fill: #132025; }
      .small { font: 600 16px Arial, sans-serif; fill: #486269; letter-spacing: 0.04em; text-transform: uppercase; }
      .small-light { font: 600 16px Arial, sans-serif; fill: #F2EADF; letter-spacing: 0.04em; text-transform: uppercase; }
      .small-accent { font: 600 15px Arial, sans-serif; fill: #E7EDD2; letter-spacing: 0.04em; text-transform: uppercase; }
      .small-accent-purple { font: 600 15px Arial, sans-serif; fill: #E1D9F0; letter-spacing: 0.04em; text-transform: uppercase; }
      .code { font: 600 15px "SFMono-Regular", Consolas, monospace; fill: #F8F6F1; }
      .code-dark { font: 600 15px "SFMono-Regular", Consolas, monospace; fill: #284046; }
      .decision { font: 700 18px Arial, sans-serif; fill: #132025; }
      .path { fill: none; stroke: #26434A; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
      .path-soft { stroke: #6A7C7F; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 14; }
    </style>
  </defs>

  <rect width="1920" height="716" rx="36" fill="url(#bg)"/>
  <circle cx="177" cy="110" r="94" fill="#E6D3B2" fill-opacity="0.55"/>
  <circle cx="1729" cy="602" r="124" fill="#BFD3CB" fill-opacity="0.6"/>
  <path d="M122 620C210 562 291 577 346 622" class="path-soft"/>
  <path d="M1458 108C1535 84 1638 97 1718 152" class="path-soft"/>

  <text x="120" y="108" class="small">Script + Agent Pattern</text>
  <text x="120" y="154" class="title">Interpret with AI. Enforce with code.</text>

  <g filter="url(#shadow)">
    <rect x="118" y="196" width="446" height="354" rx="28" fill="#F8F6F1"/>
    <text x="156" y="244" class="small">Incoming Requests</text>

    <rect x="156" y="276" width="370" height="68" rx="22" fill="#E6EEF0"/>
    <text x="184" y="319" class="body">"I need access to the finance dashboard."</text>

    <rect x="156" y="366" width="370" height="68" rx="22" fill="#F2E6DD"/>
    <text x="184" y="408" class="body">"Sarah's report says I lack permission."</text>

    <rect x="156" y="456" width="370" height="68" rx="22" fill="#E4EAD5"/>
    <text x="184" y="498" class="body">"Can't get into the numbers thing."</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="644" y="196" width="290" height="354" rx="30" fill="url(#agent)"/>
    <text x="682" y="244" class="small-light">LLM Agent</text>
    <text x="682" y="302" class="body-light">Reads messy language</text>
    <text x="682" y="338" class="body-light">Maps intent to a</text>
    <text x="682" y="374" class="body-light">structured request type</text>

    <rect x="682" y="412" width="214" height="102" rx="18" fill="#F9E3D6" fill-opacity="0.18" stroke="#FFD4BF" stroke-width="2"/>
    <text x="706" y="445" class="code">{"category":</text>
    <text x="706" y="472" class="code">"finance-access",</text>
    <text x="706" y="499" class="code">"confidence": 0.94}</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="994" y="196" width="290" height="354" rx="30" fill="url(#script)"/>
    <text x="1032" y="244" class="small-light">Deterministic Script</text>
    <text x="1032" y="302" class="body-light">Validates category</text>
    <text x="1032" y="338" class="body-light">Checks confidence</text>
    <text x="1032" y="374" class="body-light">Applies routing rules</text>

    <rect x="1032" y="412" width="214" height="102" rx="18" fill="#D2E4E7" fill-opacity="0.16" stroke="#D3EEF2" stroke-width="2"/>
    <text x="1056" y="445" class="code">if valid &amp;&amp;</text>
    <text x="1056" y="472" class="code">confidence &gt;= 0.90</text>
    <text x="1056" y="499" class="code">route_request()</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M1458 373L1532 299L1606 373L1532 447L1458 373Z" fill="#F8F6F1"/>
    <text x="1492" y="365" class="decision">Valid and</text>
    <text x="1478" y="389" class="decision">high confidence?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1620" y="454" width="236" height="94" rx="24" fill="url(#review)"/>
    <text x="1670" y="490" class="small-accent-purple">Escalation Path</text>
    <text x="1664" y="522" class="body-light-small">Send to human review</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1620" y="238" width="236" height="94" rx="24" fill="url(#good)"/>
    <text x="1675" y="274" class="small-accent">Approved Route</text>
    <text x="1668" y="306" class="body-light-small">Auto-route to team</text>
  </g>

  <path d="M564 373H644" class="path"/>

  <path d="M934 373H994" class="path"/>

  <path d="M1284 373H1458" class="path"/>

  <path d="M1532 299V285H1620" class="path"/>
  <text x="1578" y="260" class="label-branch">Yes</text>

  <path d="M1532 447V501H1620" class="path"/>
  <text x="1580" y="474" class="label-branch">No</text>

  <text x="121" y="634" class="label">Use AI to understand intent.</text>
  <text x="121" y="672" class="label">Use code to decide what happens next.</text>
</svg>